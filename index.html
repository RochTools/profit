<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Weekly Profit Calculator</title>
    <meta name="description" content="Weekly Profit Calculator — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Weekly Profit Calculator" />
    <meta property="og:description" content="Weekly Profit Calculator — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Weekly Profit Calculator" />
    <meta name="twitter:description" content="Weekly Profit Calculator — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1f2e" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lateef:wght@400;700&display=swap" rel="stylesheet">
    <style>
      .boot-loader {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f6fb;
      }
      @media (prefers-color-scheme: dark) {
        .boot-loader { background: #1a1f2e; }
      }
      .boot-spinner {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid hsl(207 62% 47% / 0.18);
        border-top-color: hsl(207 62% 47%);
        animation: boot-spin 0.7s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        .boot-spinner {
          border-color: hsl(205 71% 59% / 0.18);
          border-top-color: hsl(205 71% 59%);
        }
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader">
        <div class="boot-spinner" role="status" aria-label="Loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed: ', err));
        });
      }
    </script>
  </body>
</html>
